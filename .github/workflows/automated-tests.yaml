name: Automated Tests
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - name: Check out repository code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check spelling
        run: node --run test:spelling
      - name: Check linting
        run: node --run lint
      - name: Run unit tests
        run: node --run test:unit
